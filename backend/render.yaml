services:
  - type: web
    name: matchbot-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: matchbot-db
          property: connectionString
      - key: WA_VERIFY_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: matchbot-db
    plan: free
    databaseName: matchbot
