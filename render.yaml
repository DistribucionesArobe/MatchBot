services:
  - type: web
    name: matchbot-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: matchbot-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: FRONTEND_URL
        value: https://dashboard.matchbot.app

databases:
  - name: matchbot-db
    databaseName: matchbot
    user: matchbot
